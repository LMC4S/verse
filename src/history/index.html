<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self'" />
    <link rel="stylesheet" href="history.css" />
  </head>
  <body>
    <header class="titlebar">History</header>
    <main class="content">
      <div class="toolbar">
        <input id="searchInput" type="search" placeholder="Search transcripts…" spellcheck="false" />
        <button id="clearButton" type="button">Clear All</button>
      </div>
      <p class="count" id="countText"></p>
      <ul class="list" id="list"></ul>
      <p class="empty" id="emptyText" hidden>No transcripts yet.</p>
    </main>
    <script src="history.js"></script>
  </body>
</html>
